service: hackatonbackendv2

plugins:
  - serverless-prune-plugin
  - serverless-offline

custom:
  prune:
    automatic: true
    number: 2
  serverless-offline:
    httpPort: 3001
    lambdaPort: 3002
  bucketName: ${self:service}-documents-v245-${self:provider.stage}-${aws:accountId}

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    # --- Multi-Tenant Core Tables ---
    TENANTS_TABLE: ${self:service}-tenants-${self:provider.stage}
    OBRAS_TABLE: ${self:service}-obras-${self:provider.stage}
    PERSONAS_TABLE: ${self:service}-personas-${self:provider.stage}
    # --- Operational Tables ---
    SIGNATURE_REQUESTS_TABLE: ${self:service}-signature-requests-${self:provider.stage}
    SIGNATURES_TABLE: ${self:service}-signatures-${self:provider.stage}
    SESSIONS_TABLE: ${self:service}-sessions-${self:provider.stage}
    SURVEYS_TABLE: ${self:service}-surveys-${self:provider.stage}
    INCIDENTS_TABLE: ${self:service}-incidents-${self:provider.stage}
    DOCUMENTS_TABLE: ${self:service}-documents-${self:provider.stage}
    ACTIVITIES_TABLE: ${self:service}-activities-${self:provider.stage}
    INBOX_TABLE: ${self:service}-inbox-${self:provider.stage}
    SUGGESTIONS_TABLE: ${self:service}-sugerencias-${self:provider.stage}
    # --- Storage ---
    DOCUMENTS_BUCKET: ${self:custom.bucketName}
    INCIDENT_EVIDENCE_BUCKET: ${self:service}-evidence-${self:provider.stage}-${aws:accountId}
    INCIDENT_NOTIFICATION_TOPIC: ${self:service}-incident-notifications-${self:provider.stage}
    # --- External ---
    SES_SENDER_EMAIL: 'benjasncz@gmail.com'
    IS_OFFLINE: ${env:IS_OFFLINE, 'false'}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}

  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            # --- Multi-Tenant Core ---
            - !GetAtt TenantsTable.Arn
            - !Sub ${TenantsTable.Arn}/index/*
            - !GetAtt ObrasTable.Arn
            - !Sub ${ObrasTable.Arn}/index/*
            - !GetAtt PersonasTable.Arn
            - !Sub ${PersonasTable.Arn}/index/*
            # --- Operational ---
            - !GetAtt SignatureRequestsTable.Arn
            - !Sub ${SignatureRequestsTable.Arn}/index/*
            - !GetAtt SignaturesTable.Arn
            - !Sub ${SignaturesTable.Arn}/index/*
            - !GetAtt SessionsTable.Arn
            - !GetAtt SurveysTable.Arn
            - !Sub ${SurveysTable.Arn}/index/*
            - !GetAtt IncidentsTable.Arn
            - !Sub ${IncidentsTable.Arn}/index/*
            - !GetAtt InboxTable.Arn
            - !Sub ${InboxTable.Arn}/index/*
            - !GetAtt ActivitiesTable.Arn
            - !Sub ${ActivitiesTable.Arn}/index/*
            - !GetAtt DocumentsTable.Arn
            - !Sub ${DocumentsTable.Arn}/index/*
            - !GetAtt SuggestionsTable.Arn
            - !Sub ${SuggestionsTable.Arn}/index/*

        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: "*"
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - !Sub '${IncidentEvidenceBucket.Arn}/*'
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - !Sub 'arn:aws:s3:::${self:custom.bucketName}/*'
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - !Ref IncidentNotificationTopic
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource:
            - "arn:aws:bedrock:*::foundation-model/anthropic.*"
            - "arn:aws:bedrock:*::foundation-model/amazon.*"
        - Effect: Allow
          Action:
            - aws-marketplace:ViewSubscriptions
            - aws-marketplace:Subscribe
            - aws-marketplace:Unsubscribe
          Resource: "*"

package:
  individually: false
  excludeDevDependencies: true
  patterns:
    - '!node_modules/.prisma/**'
    - '!node_modules/@prisma/**'
    - '!node_modules/.bin/**'
    - '!tests/**'
    - '!**/__tests__/**'

functions:
  # ========================================
  # TENANTS (Empresas / Multi-Tenant)
  # ========================================
  tenantsModule:
    handler: handlers/tenants-module/handler.tenantsHandler
    events:
      - httpApi:
          path: /tenants
          method: any
      - httpApi:
          path: /tenants/{proxy+}
          method: any

  # ========================================
  # OBRAS (Proyectos de Construcción)
  # ========================================
  obrasModule:
    handler: handlers/obras-module/handler.obrasHandler
    events:
      - httpApi:
          path: /obras
          method: any
      - httpApi:
          path: /obras/{proxy+}
          method: any

  # ========================================
  # PERSONAS (Identidad Unificada - reemplaza Users + Workers)
  # ========================================
  personasModule:
    handler: handlers/personas-module/handler.personasHandler
    events:
      - httpApi:
          path: /personas
          method: any
      - httpApi:
          path: /personas/{proxy+}
          method: any

  # Auth (Autenticación)
  authLogin:
    handler: handlers/auth/handler.login
    events:
      - httpApi:
          path: /auth/login
          method: POST

  authChangePassword:
    handler: handlers/auth/handler.changePassword
    events:
      - httpApi:
          path: /auth/change-password
          method: POST

  authLogout:
    handler: handlers/auth/handler.logout
    events:
      - httpApi:
          path: /auth/logout
          method: POST

  authMe:
    handler: handlers/auth/handler.me
    events:
      - httpApi:
          path: /auth/me
          method: GET

  authValidateToken:
    handler: handlers/auth/handler.validateToken
    events:
      - httpApi:
          path: /auth/validate-token
          method: POST


  # ========================================
  # SIGNATURE REQUESTS (Solicitudes de Firma)
  # ========================================
  createSignatureRequest:
    handler: handlers/signature-requests/handler.create
    events:
      - httpApi:
          path: /signature-requests
          method: POST

  listSignatureRequests:
    handler: handlers/signature-requests/handler.list
    events:
      - httpApi:
          path: /signature-requests
          method: GET

  getSignatureRequest:
    handler: handlers/signature-requests/handler.get
    events:
      - httpApi:
          path: /signature-requests/{id}
          method: GET

  getPendingByWorker:
    handler: handlers/signature-requests/handler.getPendingByWorker
    events:
      - httpApi:
          path: /signature-requests/pending/{workerId}
          method: GET

  getHistoryByWorker:
    handler: handlers/signature-requests/handler.getHistoryByWorker
    events:
      - httpApi:
          path: /signature-requests/history/{workerId}
          method: GET

  cancelSignatureRequest:
    handler: handlers/signature-requests/handler.cancel
    events:
      - httpApi:
          path: /signature-requests/{id}/cancel
          method: POST

  getSignatureRequestStats:
    handler: handlers/signature-requests/handler.getStats
    events:
      - httpApi:
          path: /signature-requests/stats
          method: GET

  processOfflineBatch:
    handler: handlers/signature-requests/handler.processOfflineBatch
    events:
      - httpApi:
          path: /signature-requests/offline-batch
          method: POST

  # Activities (Actividades)
  listActivities:
    handler: handlers/activities/handler.list
    events:
      - httpApi:
          path: /activities
          method: GET

  createActivity:
    handler: handlers/activities/handler.create
    events:
      - httpApi:
          path: /activities
          method: POST

  getActivity:
    handler: handlers/activities/handler.get
    events:
      - httpApi:
          path: /activities/{id}
          method: GET

  registerActivityAttendance:
    handler: handlers/activities/handler.registerAttendance
    events:
      - httpApi:
          path: /activities/{id}/attendance
          method: POST

  getActivityStats:
    handler: handlers/activities/handler.getStats
    events:
      - httpApi:
          path: /activities/stats
          method: GET

  # Documents (Documentos)
  listDocuments:
    handler: handlers/documents/handler.list
    events:
      - httpApi:
          path: /documents
          method: GET

  createDocument:
    handler: handlers/documents/handler.create
    events:
      - httpApi:
          path: /documents
          method: POST

  getDocument:
    handler: handlers/documents/handler.get
    events:
      - httpApi:
          path: /documents/{id}
          method: GET

  updateDocument:
    handler: handlers/documents/handler.update
    events:
      - httpApi:
          path: /documents/{id}
          method: PUT

  assignDocument:
    handler: handlers/documents/handler.assign
    events:
      - httpApi:
          path: /documents/{id}/assign
          method: POST

  signDocument:
    handler: handlers/documents/handler.sign
    events:
      - httpApi:
          path: /documents/{id}/sign
          method: POST

  signBulkDocuments:
    handler: handlers/documents/handler.signBulk
    events:
      - httpApi:
          path: /documents/{id}/sign-bulk
          method: POST

  # ========================================
  # SIGNATURES (Firmas Digitales)
  # ========================================
  createSignature:
    handler: handlers/signatures/handler.create
    events:
      - httpApi:
          path: /signatures
          method: POST

  createEnrollmentSignature:
    handler: handlers/signatures/handler.createEnrollment
    events:
      - httpApi:
          path: /signatures/enroll
          method: POST

  getSignature:
    handler: handlers/signatures/handler.get
    events:
      - httpApi:
          path: /signatures/{id}
          method: GET

  getSignaturesByWorker:
    handler: handlers/signatures/handler.getByWorker
    events:
      - httpApi:
          path: /signatures/worker/{workerId}
          method: GET

  getSignaturesByRequest:
    handler: handlers/signatures/handler.getByRequest
    events:
      - httpApi:
          path: /signatures/request/{requestId}
          method: GET

  verifySignatureByToken:
    handler: handlers/signatures/handler.verifyByToken
    events:
      - httpApi:
          path: /signatures/verify/{token}
          method: GET

  disputeSignature:
    handler: handlers/signatures/handler.dispute
    events:
      - httpApi:
          path: /signatures/{id}/dispute
          method: POST

  resolveSignatureDispute:
    handler: handlers/signatures/handler.resolve
    events:
      - httpApi:
          path: /signatures/{id}/resolve
          method: PUT

  listSignatureDisputes:
    handler: handlers/signatures/handler.listDisputes
    events:
      - httpApi:
          path: /signatures/disputes
          method: GET

  # ========================================
  # UPLOADS (Subida de archivos a S3)
  # ========================================
  getUploadUrl:
    handler: handlers/uploads/handler.getUploadUrl
    events:
      - httpApi:
          path: /uploads/presigned-url
          method: POST

  getDownloadUrl:
    handler: handlers/uploads/handler.getDownloadUrl
    events:
      - httpApi:
          path: /uploads/download-url
          method: POST

  confirmUpload:
    handler: handlers/uploads/handler.confirmUpload
    events:
      - httpApi:
          path: /uploads/confirm
          method: POST

  deleteUpload:
    handler: handlers/uploads/handler.deleteFile
    events:
      - httpApi:
          path: /uploads/{fileKey}
          method: DELETE

  getBatchDownloadUrls:
    handler: handlers/uploads/handler.getBatchDownloadUrls
    events:
      - httpApi:
          path: /uploads/batch-download-urls
          method: POST

  # AI Assistant (Asistente IA)
  aiChat:
    handler: handlers/ai-assistant/handler.chat
    timeout: 30
    events:
      - httpApi:
          path: /ai/chat
          method: POST

  aiRiskMatrix:
    handler: handlers/ai-assistant/handler.generateRiskMatrix
    timeout: 30
    events:
      - httpApi:
          path: /ai/risk-matrix
          method: POST

  aiPreventionPlan:
    handler: handlers/ai-assistant/handler.generatePreventionPlan
    timeout: 30
    events:
      - httpApi:
          path: /ai/prevention-plan
          method: POST

  aiDailyTalk:
    handler: handlers/ai-assistant/handler.generateDailyTalk
    timeout: 30
    events:
      - httpApi:
          path: /ai/daily-talk
          method: POST

  aiMIPER:
    handler: handlers/ai-assistant/handler.generateMIPER
    timeout: 30
    events:
      - httpApi:
          path: /ai/miper
          method: POST

  aiAnalyzeIncident:
    handler: handlers/ai-assistant/handler.analyzeIncident
    timeout: 30
    events:
      - httpApi:
          path: /ai/analyze-incident
          method: POST

  aiExtractIncident:
    handler: handlers/ai-assistant/handler.extractIncident
    timeout: 30
    events:
      - httpApi:
          path: /ai/extract-incident
          method: POST

  aiTranscribeAudio:
    handler: handlers/ai-assistant/handler.transcribeAudio
    timeout: 60
    events:
      - httpApi:
          path: /ai/transcribe
          method: POST

  # Surveys (Encuestas)
  createSurvey:
    handler: handlers/surveys/handler.create
    events:
      - httpApi:
          path: /surveys
          method: POST

  listSurveys:
    handler: handlers/surveys/handler.list
    events:
      - httpApi:
          path: /surveys
          method: GET

  getSurvey:
    handler: handlers/surveys/handler.get
    events:
      - httpApi:
          path: /surveys/{id}
          method: GET

  updateSurveyResponse:
    handler: handlers/surveys/handler.updateResponseStatus
    events:
      - httpApi:
          path: /surveys/{id}/responses/{workerId}
          method: POST

  incidentsModule:
    handler: handlers/incidents-module/handler.incidentsHandler
    events:
      - httpApi:
          path: /incidents
          method: any
      - httpApi:
          path: /incidents/{proxy+}
          method: any

  # Notifications
  sendWelcomeEmail:
    handler: handlers/notifications/handler.sendWelcome
    events:
      - httpApi:
          path: /test-email
          method: POST

  inboxModule:
    handler: handlers/inbox-module/handler.inboxHandler
    events:
      - httpApi:
          path: /inbox
          method: any
      - httpApi:
          path: /inbox/{proxy+}
          method: any

  # Suggestions (Sugerencias)
  createSuggestion:
    handler: handlers/suggestions/handler.create
    events:
      - httpApi:
          path: /suggestions
          method: POST

resources:
  Resources:
    # ==========================================
    # S3 BUCKETS
    # ==========================================
    DocumentsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST, DELETE]
              AllowedOrigins: ['*']
              MaxAge: 3000

    IncidentEvidenceBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.INCIDENT_EVIDENCE_BUCKET}
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins: ['*']
              AllowedMethods: [GET, PUT, POST]
              AllowedHeaders: ['*']
              MaxAge: 3000

    # ==========================================
    # SNS
    # ==========================================
    IncidentNotificationTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:provider.environment.INCIDENT_NOTIFICATION_TOPIC}
        DisplayName: Notificaciones de Incidentes y Accidentes

    # ==========================================
    # MULTI-TENANT CORE TABLES
    # ==========================================

    # Tenants - Empresas clientes del SaaS
    TenantsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TENANTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: slug
            AttributeType: S
          - AttributeName: estado
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: slug-index
            KeySchema:
              - AttributeName: slug
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: status-index
            KeySchema:
              - AttributeName: estado
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # Obras - Proyectos de construccion por tenant
    ObrasTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.OBRAS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: obraId
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: obraId-index
            KeySchema:
              - AttributeName: obraId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # Personas - Identidad unificada (reemplaza Users + Workers)
    PersonasTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PERSONAS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: personaId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: rut
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: personaId-index
            KeySchema:
              - AttributeName: personaId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: tenantRut-index
            KeySchema:
              - AttributeName: tenantId
                KeyType: HASH
              - AttributeName: rut
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # ==========================================
    # OPERATIONAL TABLES (updated with tenant GSIs)
    # ==========================================

    # Documents Table - with tenant and obra GSIs
    DocumentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DOCUMENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: documentId
            AttributeType: S
          - AttributeName: tenantId
            AttributeType: S
        KeySchema:
          - AttributeName: documentId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: tenantId-index
            KeySchema:
              - AttributeName: tenantId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          # NOTE: obraId-index will be added in a follow-up deploy

    # Suggestions Table
    SuggestionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SUGGESTIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: suggestionId
            AttributeType: S
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: suggestionId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: tenantId-createdAt-index
            KeySchema:
              - AttributeName: tenantId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          # (DynamoDB only allows 1 new GSI per CloudFormation update)

    # Activities Table - with tenant GSI
    ActivitiesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ACTIVITIES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: activityId
            AttributeType: S
          - AttributeName: tenantId
            AttributeType: S
        KeySchema:
          - AttributeName: activityId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: tenantId-index
            KeySchema:
              - AttributeName: tenantId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # Incidents Table - rename empresaId to tenantId
    IncidentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.INCIDENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: incidentId
            AttributeType: S
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: fecha
            AttributeType: S
        KeySchema:
          - AttributeName: incidentId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: tenantId-fecha-index
            KeySchema:
              - AttributeName: tenantId
                KeyType: HASH
              - AttributeName: fecha
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # Signatures Table - with tenant and persona GSIs
    SignaturesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SIGNATURES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: signatureId
            AttributeType: S
          - AttributeName: requestId
            AttributeType: S
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: personaId
            AttributeType: S
        KeySchema:
          - AttributeName: signatureId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: requestId-index
            KeySchema:
              - AttributeName: requestId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: tenantId-index
            KeySchema:
              - AttributeName: tenantId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: personaId-index
            KeySchema:
              - AttributeName: personaId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # Signature Requests Table - with tenant GSI
    SignatureRequestsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SIGNATURE_REQUESTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: requestId
            AttributeType: S
          - AttributeName: tenantId
            AttributeType: S
        KeySchema:
          - AttributeName: requestId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: tenantId-index
            KeySchema:
              - AttributeName: tenantId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # Surveys Table - with tenant GSI
    SurveysTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SURVEYS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: surveyId
            AttributeType: S
          - AttributeName: tenantId
            AttributeType: S
        KeySchema:
          - AttributeName: surveyId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: tenantId-index
            KeySchema:
              - AttributeName: tenantId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # Inbox Messages Table
    InboxTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.INBOX_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: recipientId
            AttributeType: S
          - AttributeName: messageId
            AttributeType: S
          - AttributeName: senderId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: recipientId
            KeyType: HASH
          - AttributeName: messageId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: senderId-createdAt-index
            KeySchema:
              - AttributeName: senderId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # Sessions Table - with TTL
    SessionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SESSIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: sessionId
            AttributeType: S
        KeySchema:
          - AttributeName: sessionId
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

